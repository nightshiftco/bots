name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-build-test:
    name: lint + build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.1

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race ./...

  docker-helm:
    name: docker + helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: helm lint
        run: |
          helm lint deploy/charts/nightshift-slack-bot \
            --set botName=ci \
            --set userId=00000000-0000-0000-0000-000000000000

      - name: helm template (defaults)
        run: |
          helm template ci deploy/charts/nightshift-slack-bot \
            --set botName=ci \
            --set userId=00000000-0000-0000-0000-000000000000 \
            > /dev/null

      - name: helm template (skills inline override)
        run: |
          helm template ci deploy/charts/nightshift-slack-bot \
            --set botName=ci \
            --set userId=00000000-0000-0000-0000-000000000000 \
            --set "skills.inline.custom\.md=---\nname: custom\n---\n# Custom\n" \
            > /dev/null
